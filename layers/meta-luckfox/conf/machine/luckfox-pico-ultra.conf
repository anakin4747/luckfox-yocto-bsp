# Machine configuration for the Luckfox Pico Ultra
#
# SoC: Rockchip RV1106
# CPU: ARM Cortex-A7 @ up to 1.2 GHz
# Architecture: ARMv7-A, Thumb-2, NEON, VFPv4, hard-float ABI
# Memory: 64/128 MB DRAM (LPDDR3)
# Storage: internal SPI-NOR / eMMC via Rockchip SDK flash layout
# Connectivity: 100 Mbit Ethernet, WiFi, Bluetooth 5 (BLE)
# Peripherals: I2C, SPI, UART, GPIO, USB OTG, MIPI CSI camera

require conf/machine/include/arm/armv7a/tune-cortexa7.inc

MACHINE_FEATURES = "usbhost usbgadget bluetooth wifi ext2 ext3 ext4 vfat"

# ---- Kernel ----------------------------------------------------------------
PREFERRED_PROVIDER_virtual/kernel = "linux-luckfox"
PREFERRED_VERSION_linux-luckfox   = "5.10%"

KERNEL_IMAGETYPE = "zImage"
KERNEL_DEVICETREE = "rv1106g-luckfox-pico-ultra.dtb"

# Vendor defconfig shipped in the Rockchip BSP kernel tree.
KBUILD_DEFCONFIG = "luckfox_rv1106_linux_defconfig"

# ---- Bootloader ------------------------------------------------------------
PREFERRED_PROVIDER_virtual/bootloader = "u-boot"

# ---- Serial console --------------------------------------------------------
SERIAL_CONSOLES = "1500000;ttyS0"

# ---- Rootfs image format ---------------------------------------------------
IMAGE_FSTYPES = "ext4 tar.bz2"

# ext4 rootfs tuning (Scarthgap uses : override syntax)
EXTRA_IMAGECMD:ext4 = "-L rootfs"

# ---- Toolchain -------------------------------------------------------------
DEFAULTTUNE = "cortexa7thf-neon-vfpv4"

# ---- Miscellaneous ---------------------------------------------------------
# Use the same hostname that the Buildroot image used
hostname:pn-base-files = "luckfox"

# Root password – change before shipping production images
ROOT_PASSWORD ?= "luckfox"

# Timezone
DEFAULT_TIMEZONE = "UTC"
