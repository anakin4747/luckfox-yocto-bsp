# Luckfox distro configuration
#
# A lightweight distro based on Poky, trimmed for the RV1106's constrained
# resources (64–128 MB RAM).  Uses musl libc by default to stay closer to
# the uClibc-based Buildroot image, but glibc can be selected by setting
# TCLIBC = "glibc" in local.conf.

require conf/distro/poky.conf

DISTRO = "luckfox"
DISTRO_NAME = "Luckfox Embedded Linux"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "pico"

# Use musl for a smaller footprint (closer to original uClibc build)
TCLIBC = "musl"

# Remove X11 / Wayland from default features – this is a headless system
DISTRO_FEATURES:remove = "x11 wayland vulkan opengl ptest pcmcia"

# Keep Bluetooth, WiFi, systemd
DISTRO_FEATURES:append = " bluetooth wifi"

# Use systemd as the init system
DISTRO_FEATURES:append = " systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"

# Enable connman for WiFi management
VIRTUAL-RUNTIME_net_manager = "connman"

# Strip debug symbols to shrink image size; comment out during development
INHIBIT_PACKAGE_STRIP = "0"

# SDK / eSDK configuration
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATH = "/opt/${DISTRO}/${SDK_VERSION}"
