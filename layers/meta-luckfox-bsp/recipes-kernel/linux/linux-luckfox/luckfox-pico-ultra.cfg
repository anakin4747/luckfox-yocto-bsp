# Kernel configuration fragment for Luckfox Pico Ultra
#
# These options are additive on top of the vendor defconfig
# (luckfox_rv1106_linux_defconfig).  Add board-specific overrides here
# rather than patching the defconfig so that upstream merges stay clean.

# --- File systems -----------------------------------------------------------
CONFIG_EXT4_FS=y
CONFIG_EXT4_USE_FOR_EXT2=y
CONFIG_VFAT_FS=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y

# --- Networking -------------------------------------------------------------
CONFIG_PACKET=y
CONFIG_UNIX=y
CONFIG_INET=y
CONFIG_IPV6=y
CONFIG_NET_SCHED=y

# --- Bluetooth --------------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_BNEP=y
CONFIG_BT_HIDP=y
CONFIG_BT_HCIBTUSB=y
CONFIG_BT_HCIUART=y

# --- USB --------------------------------------------------------------------
CONFIG_USB=y
CONFIG_USB_GADGET=y
CONFIG_USB_ETH=m

# --- I2C / SPI / GPIO -------------------------------------------------------
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_GPIOLIB=y
CONFIG_GPIO_SYSFS=y

# --- Misc -------------------------------------------------------------------
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_TMPFS=y
CONFIG_POSIX_MQUEUE=y
