header:
  version: 14

machine: luckfox-pico-ultra
distro: luckfox
target: luckfox-image-minimal

build_system: openembedded

repos:
  bitbake:
    url: https://github.com/openembedded/bitbake
    branch: "2.8"
    path: layers/bitbake
    layers: {}

  openembedded-core:
    url: https://github.com/openembedded/openembedded-core
    branch: scarthgap
    path: layers/openembedded-core
    layers:
      meta:

  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    branch: scarthgap
    path: layers/meta-yocto
    layers:
      meta-poky:
      meta-yocto-bsp:

  yocto-docs:
    url: https://git.yoctoproject.org/yocto-docs
    branch: scarthgap
    path: layers/yocto-docs
    layers: {}

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    branch: scarthgap
    path: layers/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-networking:

  meta-luckfox-bsp:
    path: layers/meta-luckfox-bsp

  meta-luckfox:
    path: layers/meta-luckfox
